{% extends "base.html" %}
{% block title %}Registro — {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-center">{{ app_name }}</h1>

    <div id="error" class="hidden bg-red-50 text-red-700 p-3 rounded-lg mb-4 text-sm"></div>

    <form id="register-form" class="space-y-4" novalidate>
      <div>
        <label for="full-name" class="block text-sm font-medium mb-1">Nombre</label>
        <input id="full-name" type="text" autocomplete="name" required
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium mb-1">Email</label>
        <input id="email" type="email" autocomplete="email" required
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium mb-1">Contraseña</label>
        <input id="password" type="password" autocomplete="new-password" required
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button id="submit" type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium disabled:opacity-50 disabled:cursor-not-allowed">
        Crear cuenta
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-500">
      ¿Ya tienes cuenta?
      <a href="/login" class="text-blue-600 hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
{% endblock %}
{% block view_script %}register{% endblock %}

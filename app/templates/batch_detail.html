{% extends "base.html" %}
{% block title %}Detalle del lote — {{ app_name }}{% endblock %}
{% block content %}
<div class="flex h-screen">

  <aside class="w-48 bg-gray-800 text-white flex flex-col p-4 space-y-2 shrink-0">
    <span class="font-bold text-lg mb-4">{{ app_name }}</span>
    <a href="/" class="px-3 py-2 rounded hover:bg-gray-700">Editor</a>
    <a href="/history" class="px-3 py-2 rounded bg-gray-700 font-medium">Historial</a>
    <button id="logout" class="px-3 py-2 rounded hover:bg-gray-700 text-left mt-auto">
      Salir
    </button>
  </aside>

  <main data-batch-id="{{ batch_id }}" class="flex-1 p-8 overflow-y-auto">

    <a href="/history"
       class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-800 mb-5">
      ← Historial
    </a>

    <h1 id="batch-title" class="text-2xl font-bold mb-1">Cargando…</h1>
    <p id="prompt-display" class="text-sm text-gray-500 italic mb-6"></p>

    <!-- Barra de progreso -->
    <div class="mb-8">
      <div class="flex justify-between text-sm text-gray-500 mb-1">
        <span id="progress-label">Iniciando…</span>
        <span id="progress-count"></span>
      </div>
      <div class="bg-gray-200 rounded-full h-2">
        <div id="progress-bar"
             class="bg-blue-500 h-2 rounded-full transition-all duration-500"
             style="width: 0%"></div>
      </div>
    </div>

    <!-- Grid de jobs -->
    <div id="jobs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </main>
</div>
{% endblock %}
{% block view_script %}batch_detail{% endblock %}

{% extends "base.html" %}
{% block title %}Detalle del lote — {{ app_name }}{% endblock %}
{% block content %}
<div class="flex flex-col h-screen">

  <!-- Mobile topbar -->
  <div class="md:hidden flex items-center gap-3 px-4 h-14 bg-gray-900 text-white shrink-0">
    <button id="sidebar-toggle" class="p-1.5 rounded-lg hover:bg-white/10 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <span class="font-semibold text-sm">{{ app_name }}</span>
  </div>

  <div class="flex flex-1 min-h-0">

    <!-- Overlay móvil -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-gray-900 text-white flex flex-col -translate-x-full md:translate-x-0 md:relative md:inset-auto transition-transform duration-200 shrink-0">
      <div class="px-5 py-4 border-b border-white/10 hidden md:block">
        <span class="font-bold text-sm tracking-wide">{{ app_name }}</span>
      </div>
      <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
        <a href="/" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
          Editor
        </a>
        <a href="/compose" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
          Componer
        </a>
        <a href="/history" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm bg-white/10 text-white font-medium">
          Historial
        </a>
      </nav>
      <div class="p-3 border-t border-white/10">
        <button id="logout" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-white/5 hover:text-white transition-colors text-left">
          Salir
        </button>
      </div>
    </aside>

    <!-- Contenido -->
    <main data-batch-id="{{ batch_id }}" class="flex-1 overflow-y-auto bg-gray-50 p-6 lg:p-8">

      <a href="/history"
         class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-700 mb-6 transition-colors">
        ← Historial
      </a>

      <h1 id="batch-title" class="text-xl font-semibold text-gray-900 mb-1">Cargando…</h1>
      <p id="prompt-display" class="text-sm text-gray-500 italic mb-6"></p>

      <!-- Barra de progreso -->
      <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-6">
        <div class="flex justify-between text-sm text-gray-500 mb-2">
          <span id="progress-label" class="font-medium">Iniciando…</span>
          <span id="progress-count" class="tabular-nums"></span>
        </div>
        <div class="bg-gray-100 rounded-full h-2">
          <div id="progress-bar"
               class="bg-blue-500 h-2 rounded-full transition-all duration-500"
               style="width: 0%"></div>
        </div>
      </div>

      <!-- Foto de referencia -->
      <div id="overlay-section" class="hidden mb-6 p-4 bg-white rounded-2xl border border-gray-200">
        <p class="text-xs text-gray-500 mb-2 font-medium uppercase tracking-wide">Foto de referencia usada</p>
        <img id="overlay-img" class="h-28 rounded-xl object-contain border border-gray-100 bg-gray-50" alt="Referencia">
      </div>

      <!-- Grid de jobs -->
      <div id="jobs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    </main>
  </div>
</div>
{% endblock %}
{% block view_script %}batch_detail{% endblock %}

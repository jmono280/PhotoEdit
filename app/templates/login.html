{% extends "base.html" %}
{% block title %}Iniciar sesión — {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-sm mx-4">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-gray-900 rounded-2xl shadow mb-4">
        <span class="text-2xl">🖼</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">{{ app_name }}</h1>
      <p class="text-sm text-gray-500 mt-1">Inicia sesión para continuar</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <div id="error" class="hidden bg-red-50 text-red-700 p-3 rounded-xl mb-5 text-sm border border-red-100"></div>

      <form id="login-form" class="space-y-5" novalidate>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" autocomplete="email" required
                 class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-colors bg-gray-50">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
          <input id="password" type="password" autocomplete="current-password" required
                 class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-colors bg-gray-50">
        </div>
        <button id="submit" type="submit"
                class="w-full bg-blue-600 text-white py-2.5 rounded-xl hover:bg-blue-700 font-medium text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-1">
          Entrar
        </button>
      </form>
    </div>

    <p class="mt-5 text-center text-sm text-gray-500">
      ¿No tienes cuenta?
      <a href="/register" class="text-blue-600 hover:underline font-medium">Regístrate</a>
    </p>

  </div>
</div>
{% endblock %}
{% block view_script %}login{% endblock %}

{% extends "base.html" %}
{% block title %}Historial — {{ app_name }}{% endblock %}
{% block content %}
<div class="flex h-screen">

  <aside class="w-48 bg-gray-800 text-white flex flex-col p-4 space-y-2 shrink-0">
    <span class="font-bold text-lg mb-4">{{ app_name }}</span>
    <a href="/" class="px-3 py-2 rounded hover:bg-gray-700">Editor</a>
    <a href="/history" class="px-3 py-2 rounded bg-gray-700 font-medium">Historial</a>
    <button id="logout" class="px-3 py-2 rounded hover:bg-gray-700 text-left mt-auto">
      Salir
    </button>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    <h1 class="text-2xl font-bold mb-6">Historial de lotes</h1>
    <div id="batch-list" class="space-y-3"></div>
    <p id="empty" class="hidden text-gray-400 text-sm">No hay lotes todavía.</p>
  </main>

</div>
{% endblock %}
{% block view_script %}history{% endblock %}

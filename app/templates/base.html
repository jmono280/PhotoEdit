<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Photo Edit AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼</text></svg>">
</head>
<body class="bg-gray-50 text-gray-900"{% if max_images is defined %} data-max-images="{{ max_images }}"{% endif %}>

  {% block content %}{% endblock %}

  {% block extra_scripts %}{% endblock %}
  <script type="module" src="/static/js/views/{% block view_script %}{% endblock %}.js"></script>

</body>
</html>
